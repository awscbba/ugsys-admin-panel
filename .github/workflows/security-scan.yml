name: DAST Security Scan

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production
      target_url:
        description: "Override target URL (leave blank to use default for environment)"
        required: false
        default: ""

env:
  ADMIN_SHELL_URL: "https://admin.apps.cloud.org.bo"
  BFF_API_BASE: "https://admin.apps.cloud.org.bo/api/v1"

jobs:
  resolve-target:
    name: Resolve Target URL
    runs-on: ubuntu-latest
    outputs:
      target_url: ${{ steps.resolve.outputs.target_url }}
    steps:
      - name: Resolve target URL
        id: resolve
        run: |
          if [ -n "${{ github.event.inputs.target_url }}" ]; then
            echo "target_url=${{ github.event.inputs.target_url }}" >> "$GITHUB_OUTPUT"
          else
            echo "target_url=${{ env.ADMIN_SHELL_URL }}" >> "$GITHUB_OUTPUT"
          fi

  zap-scan:
    name: OWASP ZAP Full Scan
    runs-on: ubuntu-latest
    needs: resolve-target
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run OWASP ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.10.0
        with:
          target: ${{ needs.resolve-target.outputs.target_url }}
          rules_file_name: ".zap/rules.tsv"
          cmd_options: "-a"
          fail_action: true
          allow_issue_writing: false
          artifact_name: zap-report

      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: |
            report_html.html
            report_json.json
          retention-days: 30

  nuclei-scan:
    name: Nuclei API Scan
    runs-on: ubuntu-latest
    needs: resolve-target
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nuclei
        run: |
          go install -v github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Update Nuclei templates
        run: nuclei -update-templates

      - name: Run Nuclei against BFF API endpoints
        id: nuclei
        run: |
          nuclei \
            -u "${{ env.BFF_API_BASE }}" \
            -tags api,owasp,cve \
            -severity critical,high,medium \
            -o nuclei-report.txt \
            -json-export nuclei-report.json \
            -exit-code \
            -silent
        continue-on-error: true

      - name: Check for critical findings
        run: |
          if [ -f nuclei-report.json ]; then
            CRITICAL=$(jq '[.[] | select(.info.severity == "critical")] | length' nuclei-report.json 2>/dev/null || echo "0")
            echo "Critical findings: $CRITICAL"
            if [ "$CRITICAL" -gt 0 ]; then
              echo "::error::Nuclei found $CRITICAL critical severity finding(s). Blocking production promotion."
              exit 1
            fi
          fi

      - name: Upload Nuclei report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nuclei-report
          path: |
            nuclei-report.txt
            nuclei-report.json
          retention-days: 30

  gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: [zap-scan, nuclei-scan]
    if: always()
    steps:
      - name: Evaluate security gate
        run: |
          ZAP_RESULT="${{ needs.zap-scan.result }}"
          NUCLEI_RESULT="${{ needs.nuclei-scan.result }}"

          echo "ZAP scan result:    $ZAP_RESULT"
          echo "Nuclei scan result: $NUCLEI_RESULT"

          if [ "$ZAP_RESULT" = "failure" ] || [ "$NUCLEI_RESULT" = "failure" ]; then
            echo "::error::Security gate FAILED — critical findings detected. Production promotion is blocked."
            exit 1
          fi

          echo "Security gate PASSED — no critical findings. Safe to promote to production."
