name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - "admin-shell/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: false
        default: "prod"
        type: choice
        options: [prod, dev]

env:
  AWS_REGION: "us-east-1"
  DEPLOY_ENV: ${{ github.event.inputs.environment || 'prod' }}
  NODE_VERSION: "20"

permissions:
  id-token: write
  contents: read

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Build Admin Shell SPA
  # ──────────────────────────────────────────────────────────────────────────
  build:
    name: Build Admin Shell (SPA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: admin-shell/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: admin-shell

      - name: Build
        run: npm run build
        working-directory: admin-shell

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-shell-dist-${{ github.sha }}
          path: admin-shell/dist/
          retention-days: 1

  # ──────────────────────────────────────────────────────────────────────────
  # Deploy — sync S3 + invalidate CloudFront
  # ──────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy Frontend (${{ github.event.inputs.environment || 'prod' }})
    runs-on: ubuntu-latest
    needs: build
    environment: ${{ github.event.inputs.environment || 'prod' }}
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download admin-shell dist
        uses: actions/download-artifact@v4
        with:
          name: admin-shell-dist-${{ github.sha }}
          path: admin-shell/dist/

      - name: Sync Admin Shell to S3
        run: |
          # Hashed assets — long-lived cache
          aws s3 sync admin-shell/dist/assets/ \
            "s3://${{ secrets.ADMIN_SHELL_BUCKET }}/assets/" \
            --cache-control "public, max-age=31536000, immutable" \
            --delete

          # Everything else — no cache (index.html, etc.)
          aws s3 sync admin-shell/dist/ \
            "s3://${{ secrets.ADMIN_SHELL_BUCKET }}/" \
            --exclude "assets/*" \
            --cache-control "no-cache, no-store, must-revalidate" \
            --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"

  # ──────────────────────────────────────────────────────────────────────────
  # Notify
  # ──────────────────────────────────────────────────────────────────────────
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    steps:
      - name: Slack — success
        if: needs.deploy.result == 'success'
        continue-on-error: true
        uses: slackapi/slack-github-action@v2.0.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "${{ secrets.SLACK_CHANNEL_ID }}",
              "username": "ugsys CI/CD",
              "icon_emoji": ":white_check_mark:",
              "text": "✅ Frontend deploy succeeded — ugsys-admin-panel (${{ env.DEPLOY_ENV }})",
              "blocks": [
                {
                  "type": "header",
                  "text": {"type": "plain_text", "text": "✅ Frontend deploy succeeded — ugsys-admin-panel", "emoji": true}
                },
                {
                  "type": "section",
                  "fields": [
                    {"type": "mrkdwn", "text": "*Env:*\n${{ env.DEPLOY_ENV }}"},
                    {"type": "mrkdwn", "text": "*By:*\n${{ github.actor }}"},
                    {"type": "mrkdwn", "text": "*Commit:*\n${{ github.sha }}"}
                  ]
                }
              ]
            }

      - name: Slack — failure
        if: needs.deploy.result != 'success'
        continue-on-error: true
        uses: slackapi/slack-github-action@v2.0.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "${{ secrets.SLACK_CHANNEL_ID }}",
              "username": "ugsys CI/CD",
              "icon_emoji": ":x:",
              "text": "❌ Frontend deploy failed — ugsys-admin-panel (${{ env.DEPLOY_ENV }})",
              "blocks": [
                {
                  "type": "header",
                  "text": {"type": "plain_text", "text": "❌ Frontend deploy failed — ugsys-admin-panel", "emoji": true}
                },
                {
                  "type": "section",
                  "fields": [
                    {"type": "mrkdwn", "text": "*Env:*\n${{ env.DEPLOY_ENV }}"},
                    {"type": "mrkdwn", "text": "*Run:*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>"}
                  ]
                }
              ]
            }
