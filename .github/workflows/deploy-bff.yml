name: Deploy BFF

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "Dockerfile.lambda"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/deploy-bff.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: false
        default: "prod"
        type: choice
        options: [prod, dev]

env:
  AWS_REGION: "us-east-1"
  DEPLOY_ENV: ${{ github.event.inputs.environment || 'prod' }}
  ECR_REPOSITORY: "ugsys-admin-panel"
  LAMBDA_FUNCTION: "ugsys-admin-panel"

permissions:
  id-token: write
  contents: read

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Build & push BFF container image to ECR
  # ──────────────────────────────────────────────────────────────────────────
  build:
    name: Build & Push BFF (Lambda image)
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.push.outputs.image_uri }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        id: push
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker build -f Dockerfile.lambda -t "$IMAGE_URI" -t "$REGISTRY/$ECR_REPOSITORY:latest" .
          docker push "$IMAGE_URI"
          docker push "$REGISTRY/$ECR_REPOSITORY:latest"
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

  # ──────────────────────────────────────────────────────────────────────────
  # Deploy — update Lambda function image
  # ──────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy BFF (${{ github.event.inputs.environment || 'prod' }})
    runs-on: ubuntu-latest
    needs: build
    environment: ${{ github.event.inputs.environment || 'prod' }}
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update Lambda function image
        run: |
          aws lambda update-function-code \
            --function-name "${{ env.LAMBDA_FUNCTION }}-${{ env.DEPLOY_ENV }}" \
            --image-uri "${{ needs.build.outputs.image_uri }}" \
            --region "${{ env.AWS_REGION }}"

          aws lambda wait function-updated \
            --function-name "${{ env.LAMBDA_FUNCTION }}-${{ env.DEPLOY_ENV }}" \
            --region "${{ env.AWS_REGION }}"

      - name: Sync Lambda environment variables
        env:
          DEPLOY_ENV: ${{ env.DEPLOY_ENV }}
          IDENTITY_MANAGER_BASE_URL: ${{ secrets.IDENTITY_MANAGER_BASE_URL }}
          USER_PROFILE_SERVICE_BASE_URL: ${{ secrets.USER_PROFILE_SERVICE_BASE_URL }}
          JWT_KEYS_SECRET_ARN: ${{ secrets.JWT_KEYS_SECRET_ARN }}
          JWT_PUBLIC_KEY: ${{ secrets.JWT_PUBLIC_KEY }}
          JWT_KEY_ID: ${{ secrets.JWT_KEY_ID }}
        run: |
          aws lambda update-function-configuration \
            --function-name "${{ env.LAMBDA_FUNCTION }}-${DEPLOY_ENV}" \
            --environment "Variables={
              APP_ENV=${DEPLOY_ENV},
              SERVICE_REGISTRY_TABLE_NAME=ugsys-admin-service-registry-${DEPLOY_ENV},
              AUDIT_LOG_TABLE_NAME=ugsys-admin-audit-log-${DEPLOY_ENV},
              EVENT_BUS_NAME=ugsys-platform-bus,
              LOG_LEVEL=INFO,
              JWT_AUDIENCE=admin-panel,
              JWT_ISSUER=ugsys-identity-manager,
              IDENTITY_MANAGER_BASE_URL=${IDENTITY_MANAGER_BASE_URL},
              USER_PROFILE_SERVICE_BASE_URL=${USER_PROFILE_SERVICE_BASE_URL},
              JWT_KEYS_SECRET_ARN=${JWT_KEYS_SECRET_ARN},
              JWT_PUBLIC_KEY=${JWT_PUBLIC_KEY},
              JWT_KEY_ID=${JWT_KEY_ID}
            }" \
            --region "${{ env.AWS_REGION }}"

          aws lambda wait function-updated \
            --function-name "${{ env.LAMBDA_FUNCTION }}-${DEPLOY_ENV}" \
            --region "${{ env.AWS_REGION }}"

  # ──────────────────────────────────────────────────────────────────────────
  # Notify
  # ──────────────────────────────────────────────────────────────────────────
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    steps:
      - name: Slack — success
        if: needs.deploy.result == 'success'
        continue-on-error: true
        uses: slackapi/slack-github-action@v2.0.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "${{ secrets.SLACK_CHANNEL_ID }}",
              "username": "ugsys CI/CD",
              "icon_emoji": ":white_check_mark:",
              "text": "✅ BFF deploy succeeded — ugsys-admin-panel (${{ env.DEPLOY_ENV }})",
              "blocks": [
                {
                  "type": "header",
                  "text": {"type": "plain_text", "text": "✅ BFF deploy succeeded — ugsys-admin-panel", "emoji": true}
                },
                {
                  "type": "section",
                  "fields": [
                    {"type": "mrkdwn", "text": "*Env:*\n${{ env.DEPLOY_ENV }}"},
                    {"type": "mrkdwn", "text": "*By:*\n${{ github.actor }}"},
                    {"type": "mrkdwn", "text": "*Commit:*\n${{ github.sha }}"}
                  ]
                }
              ]
            }

      - name: Slack — failure
        if: needs.deploy.result != 'success'
        continue-on-error: true
        uses: slackapi/slack-github-action@v2.0.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "${{ secrets.SLACK_CHANNEL_ID }}",
              "username": "ugsys CI/CD",
              "icon_emoji": ":x:",
              "text": "❌ BFF deploy failed — ugsys-admin-panel (${{ env.DEPLOY_ENV }})",
              "blocks": [
                {
                  "type": "header",
                  "text": {"type": "plain_text", "text": "❌ BFF deploy failed — ugsys-admin-panel", "emoji": true}
                },
                {
                  "type": "section",
                  "fields": [
                    {"type": "mrkdwn", "text": "*Env:*\n${{ env.DEPLOY_ENV }}"},
                    {"type": "mrkdwn", "text": "*Run:*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>"}
                  ]
                }
              ]
            }
