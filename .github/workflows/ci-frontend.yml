name: Admin Shell CI

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

defaults:
  run:
    working-directory: admin-shell

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 1: Lint + Format — ESLint + Prettier (blocks merge)
  # ─────────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format (ESLint + Prettier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: admin-shell/package.json

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: admin-shell/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm run lint

      - name: Prettier check
        run: pnpm run format:check

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 2: Type Check — tsc --noEmit (blocks merge)
  # ─────────────────────────────────────────────────────────────────────────────
  type-check:
    name: Type Check (tsc)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: admin-shell/package.json

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: admin-shell/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript type check
        run: pnpm run type-check

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 3: Tests + Coverage — vitest + fast-check (80% gate, blocks merge)
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Tests & Coverage (vitest)
    runs-on: ubuntu-latest
    needs: type-check
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: admin-shell/package.json

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: admin-shell/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run vitest with coverage
        run: pnpm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage-report
          path: admin-shell/coverage/

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 4: SAST — Semgrep (blocks merge)
  # ─────────────────────────────────────────────────────────────────────────────
  semgrep:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    needs: lint
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          semgrep \
            --config p/typescript \
            --config p/react \
            --config p/security-audit \
            --config p/owasp-top-ten \
            --config p/secrets \
            --error \
            "$GITHUB_WORKSPACE/admin-shell/src/"

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 5: Dependency CVEs — pnpm audit (blocks merge on high/critical)
  # ─────────────────────────────────────────────────────────────────────────────
  pnpm-audit:
    name: Dependency CVEs (pnpm audit)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: admin-shell/package.json

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: admin-shell/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: pnpm audit
        run: pnpm audit --audit-level=high

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 6: Secret scan — TruffleHog (blocks merge)
  # ─────────────────────────────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scan (TruffleHog)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 7: Build — vite (blocks merge)
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build (vite)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: admin-shell/package.json

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: admin-shell/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build with vite
        run: pnpm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: admin-shell/dist/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 8: Bundle analysis (advisory)
  # ─────────────────────────────────────────────────────────────────────────────
  bundle-analysis:
    name: Bundle Analysis (advisory)
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: admin-shell/package.json

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: admin-shell/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: admin-shell/dist/

      - name: Bundle size report
        run: |
          echo "## Bundle Size Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          find dist/assets -type f \( -name "*.js" -o -name "*.css" \) \
            | sort \
            | while read f; do
                size=$(du -sh "$f" | cut -f1)
                echo "| $f | $size |" >> $GITHUB_STEP_SUMMARY
              done

  # ─────────────────────────────────────────────────────────────────────────────
  # Notify — Slack on any job failure
  # ─────────────────────────────────────────────────────────────────────────────
  notify-failure:
    name: Notify Failure (Slack)
    runs-on: ubuntu-latest
    needs: [lint, type-check, test, semgrep, pnpm-audit, secret-scan, build]
    if: failure()
    steps:
      - name: Slack — CI failure
        continue-on-error: true
        uses: slackapi/slack-github-action@v2.0.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "${{ secrets.SLACK_CHANNEL_ID }}",
              "username": "ugsys CI/CD",
              "icon_emoji": ":x:",
              "text": "❌ Admin Shell CI failed — ugsys-admin-panel",
              "blocks": [
                {
                  "type": "header",
                  "text": {"type": "plain_text", "text": "❌ Admin Shell CI failed — ugsys-admin-panel", "emoji": true}
                },
                {
                  "type": "section",
                  "fields": [
                    {"type": "mrkdwn", "text": "*Branch:*\n${{ github.ref_name }}"},
                    {"type": "mrkdwn", "text": "*By:*\n${{ github.actor }}"},
                    {"type": "mrkdwn", "text": "*Run:*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>"}
                  ]
                }
              ]
            }
