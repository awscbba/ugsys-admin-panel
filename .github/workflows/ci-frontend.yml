name: Admin Shell CI

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

defaults:
  run:
    working-directory: admin-shell

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 1: Lint + Format — ESLint + Prettier (blocks merge)
  # ─────────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format (ESLint + Prettier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: admin-shell/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier check
        run: npm run format:check

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 2: Type Check — tsc --noEmit (blocks merge)
  # ─────────────────────────────────────────────────────────────────────────────
  type-check:
    name: Type Check (tsc --noEmit)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: admin-shell/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 3: Tests + Coverage — vitest + fast-check (80% gate, blocks merge)
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Tests & Coverage (vitest + fast-check)
    runs-on: ubuntu-latest
    needs: type-check
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: admin-shell/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run vitest with coverage
        run: npm run test:coverage -- --run

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage-report
          path: admin-shell/coverage/

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 4: SAST — Semgrep (blocks merge)
  # ─────────────────────────────────────────────────────────────────────────────
  semgrep:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    needs: lint
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          semgrep \
            --config p/typescript \
            --config p/react \
            --config p/security-audit \
            --config p/owasp-top-ten \
            --config p/secrets \
            --error \
            "$GITHUB_WORKSPACE/admin-shell/src/"

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 5: Dependency CVEs — npm audit (blocks merge on high/critical)
  # ─────────────────────────────────────────────────────────────────────────────
  npm-audit:
    name: Dependency CVEs (npm audit)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: admin-shell/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 6: Secret scan — TruffleHog (blocks merge)
  # ─────────────────────────────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scan (TruffleHog)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 7: Bundle analysis — vite build + size report (advisory)
  # ─────────────────────────────────────────────────────────────────────────────
  bundle-analysis:
    name: Bundle Analysis (advisory)
    runs-on: ubuntu-latest
    needs: test
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: admin-shell/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build with vite
        run: npm run build

      - name: Bundle size report
        run: |
          echo "## Bundle Size Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          find dist/assets -type f \( -name "*.js" -o -name "*.css" \) \
            | sort \
            | while read f; do
                size=$(du -sh "$f" | cut -f1)
                echo "| $f | $size |" >> $GITHUB_STEP_SUMMARY
              done

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: admin-shell/dist/
          retention-days: 7
