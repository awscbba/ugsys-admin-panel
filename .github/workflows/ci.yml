name: BFF Proxy CI

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

defaults:
  run:
    working-directory: .

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 1: Lint + Format (blocks merge)
  # ─────────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --all-extras

      - name: ruff check
        run: uv run ruff check src/ tests/

      - name: ruff format check
        run: uv run ruff format --check src/ tests/

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 2: Type Check (blocks merge)
  # ─────────────────────────────────────────────────────────────────────────────
  type-check:
    name: Type Check (mypy strict)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --all-extras

      - name: mypy strict
        run: uv run mypy --strict src/

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 3: Tests + Coverage (blocks merge — 80% gate)
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Tests & Coverage (pytest + hypothesis)
    runs-on: ubuntu-latest
    needs: type-check
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run pytest with coverage
        run: |
          uv run pytest \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 4: SAST — Bandit (blocks merge)
  # ─────────────────────────────────────────────────────────────────────────────
  bandit:
    name: SAST (Bandit)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run Bandit
        run: uv run bandit -r src/ -c pyproject.toml -ll

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 5: SAST — Semgrep (blocks merge)
  # ─────────────────────────────────────────────────────────────────────────────
  semgrep:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    needs: lint
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          semgrep \
            --config p/python \
            --config p/security-audit \
            --config p/owasp-top-ten \
            --config p/secrets \
            --error \
            src/

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 6: Dependency CVEs — Safety (advisory, does NOT block merge)
  # ─────────────────────────────────────────────────────────────────────────────
  safety:
    name: Dependency CVEs (Safety) [advisory]
    runs-on: ubuntu-latest
    needs: lint
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Install Safety
        run: uv pip install safety

      - name: Run Safety check
        run: uv run safety check

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 7: SBOM + CVE scan — CycloneDX → Trivy (blocks merge)
  # ─────────────────────────────────────────────────────────────────────────────
  sbom-trivy:
    name: SBOM + CVE Scan (CycloneDX + Trivy)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Install cyclonedx-bom
        run: uv pip install cyclonedx-bom

      - name: Generate SBOM (CycloneDX)
        run: uv run cyclonedx-py environment --of json -o bom.json

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Scan SBOM with Trivy
        run: |
          trivy sbom \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --exit-code 1 \
            bom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sbom
          path: bom.json

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 8: Secret scan — TruffleHog (blocks merge)
  # ─────────────────────────────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scan (TruffleHog)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 9: Architecture guard — hexagonal layer imports (blocks merge)
  # ─────────────────────────────────────────────────────────────────────────────
  architecture-guard:
    name: Architecture Guard (hexagonal layers)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Check hexagonal layer import rules
        run: python scripts/check_architecture.py
